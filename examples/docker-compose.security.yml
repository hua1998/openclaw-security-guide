# OpenClaw 安全配置示例 - Docker Compose
# 用途: 部署安全的 AI Agent 环境

version: '3.8'

services:
  # AI Agent 网关服务
  openclaw-gateway:
    image: openclaw/gateway:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    
    # 安全: 以非 root 用户运行
    user: "1000:1000"
    
    ports:
      - "127.0.0.1:8080:8080"  # 仅本地访问
    
    environment:
      # 认证配置
      - AUTH_MODE=jwt
      - JWT_SECRET=${JWT_SECRET}
      - TOKEN_EXPIRY=24h
      
      # 沙箱配置
      - SANDBOX_MODE=container
      - SANDBOX_IMAGE=openclaw/sandbox:latest
      
      # 审计日志
      - AUDIT_ENABLED=true
      - AUDIT_DESTINATION=file
      - AUDIT_PATH=/var/log/openclaw/audit.log
      
      # 限流配置
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_RPM=60
    
    volumes:
      # 配置文件
      - ./config/openclaw.json:/app/config/openclaw.json:ro
      
      # 审计日志
      - ./logs/audit:/var/log/openclaw
      
      # 只读文件系统
      - type: bind
        source: ./workspace
        target: /workspace
        read_only: false
    
    # 安全选项
    security_opt:
      - no-new-privileges:true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - openclaw-internal

  # 沙箱服务
  openclaw-sandbox:
    image: openclaw/sandbox:latest
    container_name: openclaw-sandbox
    restart: unless-stopped
    
    # 完全隔离
    network_mode: none
    
    security_opt:
      - seccomp:./config/seccomp-profile.json
      - apparmor:docker-default
    
    read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    
    networks:
      - openclaw-internal

  # 监控服务 (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:9090:9090"  # 仅本地访问
    
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    
    networks:
      - openclaw-internal

  # 告警管理器 (Alertmanager)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: openclaw-alertmanager
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:9093:9093"  # 仅本地访问
    
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    
    networks:
      - openclaw-internal

  # 日志收集 (Fluentd)
  fluentd:
    image: fluent/fluentd:v1.16-debian
    container_name: openclaw-fluentd
    restart: unless-stopped
    
    volumes:
      - ./logs/audit:/var/log/openclaw:ro
      - ./config/fluentd.conf:/fluentd/etc/fluent.conf:ro
      - fluentd-buffer:/fluentd/buffer
    
    networks:
      - openclaw-internal

volumes:
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  fluentd-buffer:
    driver: local

networks:
  openclaw-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/16
